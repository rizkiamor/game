<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis Seru MPLS: Kancil & Gajah</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Baloo 2', cursive;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            background-attachment: fixed;
            overflow-x: hidden;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 4px solid #fff;
        }

        .btn-option {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            transform: scale(1);
        }

        .btn-option:hover {
            transform: scale(1.02) translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .btn-option:active {
            transform: scale(0.98);
        }

        .correct {
            background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%) !important;
            color: #065f46 !important;
            border-color: #34d399 !important;
            animation: bounce 0.5s;
        }

        .wrong {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%) !important;
            color: #991b1b !important;
            border-color: #f87171 !important;
            animation: shake 0.5s;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-20px);}
            60% {transform: translateY(-10px);}
        }

        @keyframes shake {
            0%, 100% {transform: translateX(0);}
            10%, 30%, 50%, 70%, 90% {transform: translateX(-5px);}
            20%, 40%, 60%, 80% {transform: translateX(5px);}
        }

        .floating {
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        .modal-enter {
            animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .stars-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            font-size: 4rem;
            margin: 20px 0;
            color: #fbbf24;
            text-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- SCREEN 1: START SCREEN -->
    <div id="start-screen" class="glass-panel w-full max-w-2xl p-8 text-center relative overflow-hidden">
        <div class="absolute -top-10 -left-10 text-8xl opacity-20 floating">🌳</div>
        <div class="absolute -bottom-10 -right-10 text-8xl opacity-20 floating" style="animation-delay: 1.5s;">🐘</div>
        
        <h1 class="text-4xl md:text-6xl font-extrabold text-teal-600 mb-6 drop-shadow-sm">
            Kuis Seru MPLS! <br> <span class="text-3xl md:text-5xl text-orange-500">Kancil & Gajah 🦌🐘</span>
        </h1>
        <p class="text-xl text-gray-600 mb-8 font-semibold">SDN 3 Plawangan</p>
        
        <div class="flex justify-center mb-8">
            <img src="https://api.dicebear.com/7.x/fun-emoji/svg?seed=kancil&backgroundColor=b6e3f4,c0aede,d1d4f9,ffd5dc,ffdfbf" alt="Mascot" class="w-40 h-40 rounded-full border-4 border-white shadow-lg floating">
        </div>

        <button onclick="startQuiz()" class="bg-gradient-to-r from-orange-400 to-pink-500 hover:from-orange-500 hover:to-pink-600 text-white font-bold text-2xl py-4 px-12 rounded-full shadow-xl transform transition hover:scale-105 active:scale-95">
            Mulai Bermain! 🚀
        </button>
    </div>

    <!-- SCREEN 2: QUIZ SCREEN -->
    <div id="quiz-screen" class="glass-panel w-full max-w-3xl p-6 md:p-10 hidden relative">
        <div class="flex justify-between items-center mb-6">
            <span id="question-counter" class="bg-teal-100 text-teal-800 text-lg font-bold px-4 py-2 rounded-full border-2 border-teal-300">
                Pertanyaan 1/10
            </span>
            <div class="flex items-center gap-2">
                <span class="text-2xl">⭐</span>
                <span id="score-display" class="text-2xl font-bold text-orange-500">0</span>
            </div>
        </div>

        <!-- Progress Bar -->
        <div class="w-full bg-gray-200 rounded-full h-4 mb-8 border-2 border-white shadow-inner">
            <div id="progress-bar" class="bg-gradient-to-r from-green-400 to-blue-500 h-full rounded-full transition-all duration-500" style="width: 10%"></div>
        </div>

        <h2 id="question-text" class="text-3xl md:text-4xl font-extrabold text-gray-800 mb-8 text-center leading-tight">
            Pertanyaan dimuat disini...
        </h2>

        <div id="options-container" class="grid grid-cols-1 gap-4">
            <!-- Buttons will be injected here via JS -->
        </div>
    </div>

    <!-- FEEDBACK MODAL (Muncul setelah menjawab) -->
    <div id="feedback-modal" class="fixed inset-0 bg-black bg-opacity-60 z-50 hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-3xl p-8 max-w-md w-full text-center transform scale-90 transition-transform duration-300 border-8 border-white shadow-2xl" id="feedback-content">
            <div id="feedback-icon" class="text-7xl mb-4">🎉</div>
            <h3 id="feedback-title" class="text-3xl font-bold mb-4">Hore! Benar!</h3>
            <div class="bg-blue-50 border-2 border-blue-200 rounded-xl p-4 mb-6">
                <p class="text-sm font-bold text-blue-800 mb-1">💡 Tahukah Kamu?</p>
                <p id="feedback-explanation" class="text-lg text-gray-700 font-semibold leading-snug">Penjelasan edukasi ada disini.</p>
            </div>
            <button onclick="nextQuestion()" class="w-full bg-teal-500 hover:bg-teal-600 text-white font-bold text-xl py-3 px-6 rounded-full shadow-lg transform transition hover:scale-105">
                Lanjut ➡️
            </button>
        </div>
    </div>

    <!-- SCREEN 3: RESULT SCREEN -->
    <div id="result-screen" class="glass-panel w-full max-w-2xl p-8 text-center hidden relative overflow-hidden">
        <h1 class="text-5xl font-extrabold text-teal-600 mb-2">Kuis Selesai!</h1>
        <p class="text-2xl text-gray-600 mb-6 font-bold">Kamu Hebat Sekali!</p>
        
        <div class="stars-container" id="stars-container">
            <!-- Stars injected via JS -->
        </div>

        <div class="bg-white rounded-2xl p-6 border-4 border-orange-200 mb-8 inline-block shadow-lg">
            <p class="text-xl text-gray-500 font-bold mb-2">Skor Kamu</p>
            <p id="final-score" class="text-6xl font-black text-orange-500">100</p>
        </div>

        <p class="text-xl text-gray-700 font-semibold mb-8 px-4" id="final-message">
            Pesan moral ditaruh disini.
        </p>

        <button onclick="restartQuiz()" class="bg-gradient-to-r from-teal-400 to-blue-500 hover:from-teal-500 hover:to-blue-600 text-white font-bold text-2xl py-4 px-12 rounded-full shadow-xl transform transition hover:scale-105 active:scale-95">
            Main Lagi 🔄
        </button>
    </div>

    <!-- Audio Effects (Optional: Using browser speech synthesis for fun) -->
    <script>
        const questions = [
            {
                q: "Siapa saja dua hewan yang menjadi tokoh dalam dongeng tadi?",
                options: ["Kancil dan Gajah 🦌🐘", "Kucing dan Tikus 🐈🐁", "Harimau dan Monyet 🐅🐒"],
                correct: 0,
                explanation: "Cerita tadi bercerita tentang kecerdikan Kancil dan kejahilan Gajah Epan."
            },
            {
                q: "Siapa nama gajah bertubuh besar di cerita tadi?",
                options: ["Opan", "Epan", "Ipin"],
                correct: 1,
                explanation: "Ya! Namanya Epan. Tubuhnya besar, tapi sayangnya dia suka menjahili teman."
            },
            {
                q: "Apa yang dilakukan Gajah Epan pada lubang jebakan?",
                options: ["Mengisinya dengan air 💧", "Menanam pohon 🌳", "Menutupinya dengan daun 🍂"],
                correct: 2,
                explanation: "Epan menutupi lubang dengan dedaunan agar hewan lain jatuh. Ingat, menyembunyikan bahaya itu perbuatan tidak baik!"
            },
            {
                q: "Saat Kancil jatuh ke dalam lubang, apakah Gajah menolongnya?",
                options: ["Ya, Kancil ditolong 🤝", "Tidak, Kancil ditertawakan 😂", "Gajah ikut menangis 😭"],
                correct: 1,
                explanation: "Gajah malah menertawakan Kancil. Seharusnya kalau ada teman yang kesusahan, kita wajib menolongnya."
            },
            {
                q: "Apa ide cerdik Kancil saat mendengar suara guntur?",
                options: ["Berteriak minta tolong 🗣️", "Mengatakan langit akan runtuh ⚡", "Berpura-pura tidur 😴"],
                correct: 1,
                explanation: "Kancil sangat pintar! Ia menggunakan akalnya agar tidak panik saat sedang terkena musibah."
            },
            {
                q: "Mengapa Gajah Epan akhirnya ikut masuk ke dalam lubang?",
                options: ["Ingin menemani Kancil", "Sedang mencari makan", "Takut langitnya runtuh 😱"],
                correct: 2,
                explanation: "Epan mudah panik dan tertipu oleh Kancil karena dia ketakutan."
            },
            {
                q: "Bagaimana cara Kancil yang kecil bisa keluar dari lubang?",
                options: ["Terbang seperti burung 🦅", "Naik ke punggung Gajah 🐘", "Digali oleh pemburu ⛏️"],
                correct: 1,
                explanation: "Kancil memanfaatkan tubuh besar Gajah untuk melompat keluar. Wah, cerdik sekali ya!"
            },
            {
                q: "Di akhir cerita, siapakah yang akhirnya terjebak di dalam lubang?",
                options: ["Kancil 🦌", "Harimau 🐅", "Gajah Epan 🐘"],
                correct: 2,
                explanation: "Karena niat jahatnya sendiri, Epan malah 'kena batunya' dan terjebak di lubang."
            },
            {
                q: "Apakah sifat Gajah Epan yang suka menjahili teman boleh dicontoh?",
                options: ["Boleh banget!", "Tidak boleh! ❌", "Boleh kadang-kadang"],
                correct: 1,
                explanation: "Kita harus selalu rukun dan saling menyayangi teman baru di SDN 3 Plawangan!"
            },
            {
                q: "Apa pesan kebaikan yang kita pelajari dari dongeng ini?",
                options: ["Harus jadi penakut", "Boleh jahil asal pintar", "Jangan berniat buruk pada orang lain ❤️"],
                correct: 2,
                explanation: "Siapa yang berbuat baik akan punya banyak teman, siapa yang nakal akan rugi sendiri."
            }
        ];

        let currentQuestion = 0;
        let score = 0;
        let isAnswered = false;

        // Elements
        const startScreen = document.getElementById('start-screen');
        const quizScreen = document.getElementById('quiz-screen');
        const resultScreen = document.getElementById('result-screen');
        
        const questionText = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const questionCounter = document.getElementById('question-counter');
        const scoreDisplay = document.getElementById('score-display');
        const progressBar = document.getElementById('progress-bar');
        
        const feedbackModal = document.getElementById('feedback-modal');
        const feedbackContent = document.getElementById('feedback-content');
        const feedbackIcon = document.getElementById('feedback-icon');
        const feedbackTitle = document.getElementById('feedback-title');
        const feedbackExplanation = document.getElementById('feedback-explanation');

        function startQuiz() {
            startScreen.classList.add('hidden');
            quizScreen.classList.remove('hidden');
            currentQuestion = 0;
            score = 0;
            updateScore();
            loadQuestion();
        }

        function loadQuestion() {
            isAnswered = false;
            const q = questions[currentQuestion];
            
            // Update UI
            questionCounter.innerText = `Pertanyaan ${currentQuestion + 1} / ${questions.length}`;
            progressBar.style.width = `${((currentQuestion) / questions.length) * 100}%`;
            questionText.innerText = q.q;
            
            // Clear previous options
            optionsContainer.innerHTML = '';
            
            // Create option buttons
            q.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'btn-option w-full bg-white border-4 border-teal-200 text-gray-700 font-bold text-xl md:text-2xl py-4 px-6 rounded-2xl shadow-sm hover:bg-teal-50 text-left relative overflow-hidden';
                btn.innerHTML = `<span class="inline-block bg-teal-100 text-teal-700 w-10 h-10 text-center leading-10 rounded-full mr-3 text-lg">${String.fromCharCode(65 + index)}</span> ${opt}`;
                btn.onclick = () => checkAnswer(index, btn);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(selectedIndex, btnElement) {
            if (isAnswered) return;
            isAnswered = true;

            const q = questions[currentQuestion];
            const isCorrect = (selectedIndex === q.correct);

            // Style the clicked button
            if (isCorrect) {
                btnElement.classList.add('correct');
                score += 10;
                updateScore();
                showFeedback(true, q.explanation);
            } else {
                btnElement.classList.add('wrong');
                // Highlight the correct one too
                const allBtns = optionsContainer.children;
                allBtns[q.correct].classList.add('correct');
                showFeedback(false, q.explanation);
            }
        }

        function showFeedback(isCorrect, explanationText) {
            setTimeout(() => {
                feedbackModal.classList.remove('hidden');
                feedbackContent.classList.add('modal-enter');
                
                if (isCorrect) {
                    feedbackContent.className = 'bg-white rounded-3xl p-8 max-w-md w-full text-center transform border-8 border-green-400 shadow-2xl modal-enter';
                    feedbackIcon.innerText = '🎉⭐';
                    feedbackTitle.innerText = 'Wah, Jawabanmu Benar!';
                    feedbackTitle.className = 'text-3xl font-extrabold mb-4 text-green-600';
                } else {
                    feedbackContent.className = 'bg-white rounded-3xl p-8 max-w-md w-full text-center transform border-8 border-red-400 shadow-2xl modal-enter';
                    feedbackIcon.innerText = 'Oops! 🙈';
                    feedbackTitle.innerText = 'Yah, Kurang Tepat!';
                    feedbackTitle.className = 'text-3xl font-extrabold mb-4 text-red-500';
                }
                
                feedbackExplanation.innerText = explanationText;
            }, 800); // Wait a moment after showing red/green button
        }

        function nextQuestion() {
            feedbackModal.classList.add('hidden');
            feedbackContent.classList.remove('modal-enter');
            
            currentQuestion++;
            
            if (currentQuestion < questions.length) {
                loadQuestion();
            } else {
                progressBar.style.width = '100%';
                setTimeout(showResult, 500);
            }
        }

        function updateScore() {
            scoreDisplay.innerText = score;
            // Add a little pop animation to score
            scoreDisplay.classList.remove('animate-ping');
            void scoreDisplay.offsetWidth; // trigger reflow
            scoreDisplay.classList.add('animate-pulse');
        }

        function showResult() {
            quizScreen.classList.add('hidden');
            resultScreen.classList.remove('hidden');
            
            document.getElementById('final-score').innerText = score;
            
            const starsContainer = document.getElementById('stars-container');
            const finalMessage = document.getElementById('final-message');
            
            starsContainer.innerHTML = '';
            let starCount = 0;
            
            if (score === 100) {
                starCount = 3;
                finalMessage.innerText = "Luar Biasa! Kamu menjawab semuanya dengan benar. Selamat datang di SDN 3 Plawangan!";
            } else if (score >= 70) {
                starCount = 2;
                finalMessage.innerText = "Bagus Sekali! Kamu mendengarkan cerita dengan sangat baik.";
            } else {
                starCount = 1;
                finalMessage.innerText = "Tetap Semangat! Jangan lupa terus belajar dan selalu berbuat baik ya.";
            }

            for(let i=0; i<3; i++) {
                if(i < starCount) {
                    starsContainer.innerHTML += `<span class="floating" style="animation-delay: ${i*0.2}s">⭐</span>`;
                } else {
                    starsContainer.innerHTML += `<span class="grayscale opacity-50">⭐</span>`;
                }
            }
        }

        function restartQuiz() {
            resultScreen.classList.add('hidden');
            startScreen.classList.remove('hidden');
        }
    </script>
</body>
</html>
